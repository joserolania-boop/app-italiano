[build]
  publish = "."
  functions = "netlify/functions"

# Proxy de voz italiana neuronal: el cliente llama a ./tts y Netlify lo
# redirige a la funcion serverless (evita CORS/ORB en produccion).
[[redirects]]
  from = "/tts"
  to = "/.netlify/functions/tts"
  status = 200

# Validacion del codigo de desbloqueo premium.
[[redirects]]
  from = "/unlock"
  to = "/.netlify/functions/unlock"
  status = 200

# El HTML siempre fresco para recibir nuevas versiones al instante
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache"

# El service worker nunca debe quedar cacheado por el navegador
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"

# El manifest siempre fresco
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache"

# Las fotos de fondo se pueden cachear con fuerza (no cambian)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
